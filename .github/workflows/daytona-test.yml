name: Daytona Multi-Platform Tests

on:
  workflow_dispatch:
    inputs:
      sandbox:
        description: 'Sandbox to test'
        required: true
        default: 'ani-tui-linux'
        type: choice
        options:
          - ani-tui-linux
          - ani-tui-macos-intel
          - ani-tui-macos-arm
          - ani-tui-windows
      command:
        description: 'Test command'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - build
          - check
          - clippy
          - fmt
  release:
    types: [published]

env:
  DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}

jobs:
  test-linux:
    runs-on: ubuntu-latest
    if: github.event.inputs.sandbox == 'ani-tui-linux' || github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Daytona CLI
        run: |
          curl -L https://github.com/daytonaio/daytona/releases/latest/download/daytona-linux-amd64 -o /tmp/daytona
          chmod +x /tmp/daytona
          sudo mv /tmp/daytona /usr/local/bin/
      
      - name: Run tests in Linux sandbox
        run: |
          ./scripts/daytona-test.sh ani-tui-linux test
        timeout-minutes: 30

  test-macos-intel:
    runs-on: ubuntu-latest
    if: github.event.inputs.sandbox == 'ani-tui-macos-intel' || github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Daytona CLI
        run: |
          curl -L https://github.com/daytonaio/daytona/releases/latest/download/daytona-linux-amd64 -o /tmp/daytona
          chmod +x /tmp/daytona
          sudo mv /tmp/daytona /usr/local/bin/
      
      - name: Run tests in macOS Intel sandbox
        run: |
          ./scripts/daytona-test.sh ani-tui-macos-intel test
        timeout-minutes: 30

  test-macos-arm:
    runs-on: ubuntu-latest
    if: github.event.inputs.sandbox == 'ani-tui-macos-arm' || github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Daytona CLI
        run: |
          curl -L https://github.com/daytonaio/daytona/releases/latest/download/daytona-linux-amd64 -o /tmp/daytona
          chmod +x /tmp/daytona
          sudo mv /tmp/daytona /usr/local/bin/
      
      - name: Run tests in macOS ARM sandbox
        run: |
          ./scripts/daytona-test.sh ani-tui-macos-arm test
        timeout-minutes: 30

  test-windows:
    runs-on: ubuntu-latest
    if: github.event.inputs.sandbox == 'ani-tui-windows' || github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Daytona CLI
        run: |
          curl -L https://github.com/daytonaio/daytona/releases/latest/download/daytona-linux-amd64 -o /tmp/daytona
          chmod +x /tmp/daytona
          sudo mv /tmp/daytona /usr/local/bin/
      
      - name: Run tests in Windows sandbox
        run: |
          ./scripts/daytona-test.sh ani-tui-windows test
        timeout-minutes: 30
