name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    
    - name: Build
      run: cargo build --release --target ${{ matrix.target }}
    
    - name: Package
      run: |
        cd target/${{ matrix.target }}/release
        zip ani-tui-${{ matrix.target }}.zip ani-tui
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ani-tui-${{ matrix.target }}
        path: target/${{ matrix.target }}/release/ani-tui-${{ matrix.target }}.zip

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Build
      run: cargo build --release
    
    - name: Package
      run: |
        cd target/release
        Compress-Archive -Path ani-tui.exe -DestinationPath ani-tui-windows-x86_64.zip
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ani-tui-windows-x86_64
        path: target/release/ani-tui-windows-x86_64.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
    
    - name: Build
      run: cargo build --release
    
    - name: Package
      run: |
        cd target/release
        tar -czf ani-tui-linux-x86_64.tar.gz ani-tui
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ani-tui-linux-x86_64
        path: target/release/ani-tui-linux-x86_64.tar.gz

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - uses: actions/checkout@v4
    
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/**/*.zip
          artifacts/**/*.tar.gz
          packaging/windows/install-complete.ps1
          packaging/windows/install.ps1
          packaging/windows/install-all.bat
        body: |
          ## Installation
          
          ### macOS
          ```bash
          # Using install script
          curl -fsSL https://raw.githubusercontent.com/silent9669/ani-tui/main/packaging/macos/install.sh | bash
          
          # Or using Homebrew
          brew tap silent9669/tap
          brew install ani-tui
          ```
          
          ### Windows (Complete Installer - RECOMMENDED)
          ```powershell
          # Install ani-tui with ALL dependencies (mpv, chafa, Visual C++ Redist)
          iwr -useb https://github.com/silent9669/ani-tui/releases/latest/download/install-complete.ps1 -OutFile install.ps1; .\install.ps1
          ```
          
          ### Windows (Simple Installer - Manual deps required)
          ```powershell
          # Install ani-tui only (you must install mpv and chafa manually)
          iwr -useb https://raw.githubusercontent.com/silent9669/ani-tui/main/packaging/windows/install.ps1 | iex
          
          # Or using Scoop
          scoop bucket add ani-tui https://github.com/silent9669/ani-tui
          scoop install ani-tui
          ```
          
          ### Linux
          ```bash
          curl -fsSL https://raw.githubusercontent.com/silent9669/ani-tui/main/packaging/linux/install.sh | bash
          ```
          
          ## What's New
          See [CHANGELOG.md](https://github.com/silent9669/ani-tui/blob/main/CHANGELOG.md) for details.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - name: Checkout homebrew-tap
      uses: actions/checkout@v4
      with:
        repository: silent9669/homebrew-tap
        token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        path: homebrew-tap
    
    - name: Download source archive
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        curl -L -o ani-tui-source.tar.gz "https://github.com/silent9669/ani-tui/archive/refs/tags/${VERSION}.tar.gz"
    
    - name: Calculate SHA256
      id: sha
      run: |
        SHA256=$(sha256sum ani-tui-source.tar.gz | awk '{print $1}')
        echo "sha256=$SHA256" >> $GITHUB_OUTPUT
    
    - name: Update Homebrew formula
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        SHA256=${{ steps.sha.outputs.sha256 }}
        mkdir -p homebrew-tap/Formula
        printf '%s\n' "class AniTui < Formula" "  desc \"A Netflix-inspired TUI for anime streaming\"" "  homepage \"https://github.com/silent9669/ani-tui\"" "  url \"https://github.com/silent9669/ani-tui/archive/refs/tags/v${VERSION}.tar.gz\"" "  sha256 \"${SHA256}\"" "  license \"MIT\"" "  head \"https://github.com/silent9669/ani-tui.git\", branch: \"main\"" "" "  depends_on \"rust\" => :build" "  depends_on \"chafa\"" "  depends_on \"mpv\"" "" "  def install" "    system \"cargo\", \"install\", *std_cargo_args" "  end" "" "  test do" "    system \"#{bin}/ani-tui\", \"--version\"" "  end" "end" > homebrew-tap/Formula/ani-tui.rb
    
    - name: Commit and push to homebrew-tap
      run: |
        cd homebrew-tap
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add Formula/ani-tui.rb
        git diff --staged --quiet || git commit -m "Update ani-tui to ${GITHUB_REF#refs/tags/}"
        git push