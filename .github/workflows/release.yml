name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    
    - name: Cache cargo registry and build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.target }}-cargo-
    
    - name: Build
      run: cargo build --release --target ${{ matrix.target }}
    
    - name: Package
      run: |
        cd target/${{ matrix.target }}/release
        rm -f ani-tui-${{ matrix.target }}.zip
        zip ani-tui-${{ matrix.target }}.zip ani-tui
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ani-tui-${{ matrix.target }}
        path: target/${{ matrix.target }}/release/ani-tui-${{ matrix.target }}.zip

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Cache cargo registry and build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-windows-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-windows-cargo-
    
    - name: Build
      run: cargo build --release
    
    - name: Package
      shell: pwsh
      run: |
        $zipPath = "target/release/ani-tui-windows-x86_64.zip"
        if (Test-Path $zipPath) { 
          Write-Host "Removing existing archive: $zipPath"
          Remove-Item $zipPath -Force 
        }
        Compress-Archive -Path "target/release/ani-tui.exe" -DestinationPath $zipPath -Force
        Write-Host "Archive created successfully: $zipPath"
        Get-ChildItem $zipPath
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ani-tui-windows-x86_64
        path: target/release/ani-tui-windows-x86_64.zip
        if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
    
    - name: Cache cargo registry and build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-linux-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-linux-cargo-
    
    - name: Build
      run: cargo build --release
    
    - name: Package
      run: |
        cd target/release
        rm -f ani-tui-linux-x86_64.tar.gz
        tar -czf ani-tui-linux-x86_64.tar.gz ani-tui
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ani-tui-linux-x86_64
        path: target/release/ani-tui-linux-x86_64.tar.gz

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - uses: actions/checkout@v4
    
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/**/*.zip
          artifacts/**/*.tar.gz
          packaging/windows/install-complete.ps1
          packaging/windows/install.ps1
          packaging/windows/install-all.bat
        body: |
          ## Installation
          
          ### macOS
          ```bash
          # Using install script
          curl -fsSL https://raw.githubusercontent.com/silent9669/ani-tui/main/packaging/macos/install.sh | bash
          
          # Or using Homebrew
          brew tap silent9669/tap
          brew install ani-tui
          ```
          
          ### Windows (Complete Installer - RECOMMENDED)
          ```powershell
          # Install ani-tui with ALL dependencies (mpv, chafa, Visual C++ Redist)
          iwr -useb https://github.com/silent9669/ani-tui/releases/latest/download/install-complete.ps1 -OutFile install.ps1; .\install.ps1
          ```
          
          ### Windows (Simple Installer - Manual deps required)
          ```powershell
          # Install ani-tui only (you must install mpv and chafa manually)
          iwr -useb https://raw.githubusercontent.com/silent9669/ani-tui/main/packaging/windows/install.ps1 | iex
          
          # Or using Scoop
          scoop bucket add ani-tui https://github.com/silent9669/ani-tui
          scoop install ani-tui
          ```
          
          ### Linux
          ```bash
          curl -fsSL https://raw.githubusercontent.com/silent9669/ani-tui/main/packaging/linux/install.sh | bash
          ```
          
          ## What's New
          See [CHANGELOG.md](https://github.com/silent9669/ani-tui/blob/main/CHANGELOG.md) for details.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: release
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - name: Checkout ani-tui
      uses: actions/checkout@v4

    - name: Checkout homebrew-tap
      uses: actions/checkout@v4
      with:
        repository: silent9669/homebrew-tap
        token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        path: homebrew-tap

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'

    - name: Generate Homebrew formula
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        ruby scripts/generate-homebrew-formula.rb "$VERSION" homebrew-tap/Formula/ani-tui.rb

    - name: Validate formula syntax
      run: |
        ruby -c homebrew-tap/Formula/ani-tui.rb

    - name: Test formula installation
      run: |
        cd homebrew-tap
        brew install --build-from-source Formula/ani-tui.rb
        brew test ani-tui

    - name: Commit and push to homebrew-tap
      run: |
        cd homebrew-tap
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add Formula/ani-tui.rb
        git diff --staged --quiet || git commit -m "Update ani-tui to ${GITHUB_REF#refs/tags/}"
        git push