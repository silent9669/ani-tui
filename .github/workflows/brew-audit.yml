name: Homebrew Audit

on:
  pull_request:
    paths:
      - 'packaging/homebrew/**'
      - '.github/workflows/brew-audit.yml'
  workflow_dispatch:

jobs:
  audit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Generate test formula
        run: |
          HOMEBREW_FORMULA_FALLBACK_BRANCH=master ruby scripts/generate-homebrew-formula.rb "v0.0.0-test" test-formula.rb

      - name: Setup temporary tap
        run: |
          mkdir -p homebrew-tap/Formula
          cp test-formula.rb homebrew-tap/Formula/ani-tui.rb
          mkdir -p "$(brew --repository)/Library/Taps/silent9669"
          rm -rf "$(brew --repository)/Library/Taps/silent9669/homebrew-tap"
          ln -s "$(pwd)/homebrew-tap" "$(brew --repository)/Library/Taps/silent9669/homebrew-tap"
          brew tap silent9669/tap

      - name: Run brew audit
        run: |
          HOMEBREW_NO_AUTO_UPDATE=1 brew audit --strict --online silent9669/tap/ani-tui

      - name: Check Ruby style
        run: |
          gem install rubocop --no-document
          rubocop --only Layout,Style packaging/homebrew/ani-tui.rb.template || true

      - name: Cleanup
        run: |
          rm -f test-formula.rb
          brew untap silent9669/tap || true
          rm -rf homebrew-tap
